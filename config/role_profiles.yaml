# ============================================================
# TACTICAL ROLE PROFILES
# tb-football-scouting-framework
# ============================================================
# Each role is a weighted combination of player metrics.
# Weights reflect the tactical importance of each metric for that role.
# Higher weight = more important for this role.
#
# Weights are justified by:
# - Football Manager 2026 key/important attribute taxonomy
#   (Sports Interactive, 2026 — developed with professional scouts)
# - Academic literature on role-based player profiling
#   (Aalbers & Van Haaren, 2019; Wicki, 2023)
# - Domain knowledge of elite football tactical systems
# ============================================================

# ─────────────────────────────────────────────────────────────
# CENTRE-BACKS (CB)
# ─────────────────────────────────────────────────────────────
CB:

  ball_playing_defender:
    # Inspired by FM2026 "Ball-Playing Defender" role
    # Key FM attributes: Passing, First Touch, Composure, Technique
    # Real examples profile: Piqué, Van Dijk, Barella-style CBs
    progressive_passes_per90: 3.0
    pass_completion_rate: 2.5
    pass_completion_under_pressure: 2.5
    progressive_carries_per90: 2.0
    passes_into_final_third_per90: 2.0
    long_pass_completion_rate: 1.5
    switches_per90: 1.5
    xA_per90: 1.0
    tackles_per90: 1.0
    interceptions_per90: 1.0
    aerial_duel_win_rate: 0.5

  no_nonsense_cb:
    # Inspired by FM2026 "No-Nonsense Centre-Back" role
    # Key FM attributes: Tackling, Marking, Heading, Bravery
    # REVISED 2025-05 : on alourdit les taux (discriminants) plutôt que les
    # volumes (redondants entre eux et fortement corrélés). On retire aussi
    # 'defensive_actions_per90' qui est colinéaire avec tackles+interceptions+
    # clearances et écrasait le spread.
    aerial_duel_win_rate: 4.0      # signature absolue du no-nonsense
    aerial_duels_per90: 3.0        # volume de duels aériens disputés
    ground_duel_win_rate: 3.0      # efficacité au sol
    clearances_per90: 3.0
    blocks_per90: 2.5
    interceptions_per90: 2.0
    tackles_per90: 1.5
    recoveries_per90: 1.5
    pass_completion_rate: 0.5      # un no-nonsense n'est pas un passeur
    progressive_passes_per90: 0.0  # explicitement neutre

  aerial_dominant_cb:
    # Inspired by FM2026 "Central Defender (Stopper)" role
    # Key FM attributes: Heading, Jumping Reach, Strength, Aerial Ability
    aerial_duels_per90: 4.0
    aerial_duel_win_rate: 4.0
    clearances_per90: 3.0
    blocks_per90: 2.0
    tackles_per90: 1.5
    interceptions_per90: 1.5
    ground_duel_win_rate: 1.0

# ─────────────────────────────────────────────────────────────
# FULL-BACKS / WING-BACKS (FB)
# ─────────────────────────────────────────────────────────────
FB:

  complete_wing_back:
    # Inspired by FM2026 "Complete Wing-Back" role
    # Key FM attributes: Crossing, Dribbling, Stamina, Off The Ball
    # REVISED 2025-05 : on alourdit la création (xA, key_passes) pour
    # distinguer les VRAIS complete-WB (qui assistent) des simples centreurs
    # volumineux. Ajout de carries_into_penalty_area (Cancelo-tendance) et
    # baisse des métriques défensives qui ne sont pas la signature de ce rôle.
    xA_per90: 3.5                          # création réelle
    key_passes_per90: 3.0                  # création réelle
    crosses_per90: 2.5
    passes_into_penalty_area_per90: 2.5
    progressive_carries_per90: 2.5
    carries_into_penalty_area_per90: 2.0   # NOUVEAU
    carries_into_final_third_per90: 2.0
    dribbles_success_rate: 2.0
    pressures_per90: 1.0
    tackles_per90: 0.5
    interceptions_per90: 0.5

  inverted_wing_back:
    # Inspired by FM2026 "Inverted Wing-Back" role (Cancelo-style)
    # Key FM attributes: Passing, Vision, Technique, Decisions
    progressive_passes_per90: 3.0
    pass_completion_rate: 2.5
    passes_into_final_third_per90: 2.5
    xA_per90: 2.0
    key_passes_per90: 2.0
    carries_per90: 1.5
    touches_per90: 1.5
    tackles_per90: 1.0
    interceptions_per90: 1.0

  defensive_full_back:
    # Inspired by FM2026 "Full-Back (Defend)" role
    # Key FM attributes: Marking, Tackling, Positioning, Concentration
    # REVISED 2025-05 : suppression de defensive_actions_per90 (colinéaire
    # avec tackles+interceptions+clearances). Ajout du pressing (dimension
    # discriminante chez les FB défensifs modernes) et alourdissement des
    # taux de duels (efficacité plutôt que volume).
    tackles_per90: 4.0
    interceptions_per90: 3.5
    ground_duel_win_rate: 3.0      # efficacité
    aerial_duel_win_rate: 3.0      # efficacité
    recoveries_per90: 2.5
    pressures_per90: 1.5           # NOUVEAU (FB moderne)
    clearances_per90: 1.5
    pass_completion_rate: 1.0

# ─────────────────────────────────────────────────────────────
# CENTRAL MIDFIELDERS (MF)
# ─────────────────────────────────────────────────────────────
MF:

  deep_lying_playmaker:
    # Inspired by FM2026 "Deep-Lying Playmaker" role
    # Key FM attributes: Passing, Vision, Composure, Technique
    # Real examples profile: Busquets, Pirlo, Kroos
    progressive_passes_per90: 3.5
    pass_completion_rate: 3.0
    passes_attempted_per90: 2.5
    xA_per90: 2.5
    key_passes_per90: 2.5
    switches_per90: 2.0
    pass_completion_under_pressure: 2.0
    long_pass_completion_rate: 1.5
    pressures_per90: 0.5
    tackles_per90: 0.5

  ball_winning_midfielder:
    # Inspired by FM2026 "Ball-Winning Midfielder" role
    # Key FM attributes: Tackling, Work Rate, Stamina, Aggression
    # Real examples profile: Kante, Rodri (defensive side)
    tackles_per90: 4.0
    interceptions_per90: 3.5
    pressures_per90: 3.0
    pressure_success_rate: 2.5
    recoveries_per90: 3.0
    defensive_actions_per90: 2.5
    ground_duel_win_rate: 2.0
    pass_completion_rate: 1.0
    progressive_passes_per90: 0.5

  box_to_box_midfielder:
    # Inspired by FM2026 "Box-to-Box Midfielder" role
    # Key FM attributes: Stamina, Work Rate, Passing, Shooting
    # REVISED 2025-05 : l'ancienne pondération uniforme (toutes les métriques
    # autour de 2.0) produisait des "moyens partout" en tête (top1=77, spread=4).
    # La signature B2B = porter le ballon vers l'avant ET finir, plus que
    # défendre (ce qui distingue du BWM). On alourdit donc carries+shots et
    # on baisse les actions défensives à un niveau "présence" plutôt que
    # "dominance".
    progressive_carries_per90: 3.5         # signature B2B : transition
    carries_into_final_third_per90: 3.0
    shots_per90: 3.0                       # arrive dans la surface
    xG_per90: 2.5
    pressures_per90: 2.5
    key_passes_per90: 2.0
    tackles_per90: 2.0
    progressive_passes_per90: 1.5
    interceptions_per90: 1.5
    xA_per90: 1.0

  mezzala:
    # Inspired by FM2026 "Mezzala" role
    # Key FM attributes: Dribbling, Passing, Off The Ball, Vision
    progressive_carries_per90: 3.0
    carries_into_final_third_per90: 3.0
    dribbles_success_rate: 2.5
    key_passes_per90: 2.5
    xA_per90: 2.5
    shots_per90: 2.0
    xG_per90: 1.5
    progressive_passes_per90: 2.0
    pass_completion_rate: 1.5

# ─────────────────────────────────────────────────────────────
# ATTACKING MIDFIELDERS / WINGERS (AM)
# ─────────────────────────────────────────────────────────────
AM:

  advanced_playmaker:
    # Inspired by FM2026 "Advanced Playmaker" role
    # Key FM attributes: Vision, Passing, Technique, First Touch
    key_passes_per90: 4.0
    xA_per90: 4.0
    progressive_passes_per90: 3.0
    passes_into_penalty_area_per90: 2.5
    pass_completion_rate: 2.0
    touches_per90: 2.0
    dribbles_success_rate: 1.5
    shots_per90: 1.0

  inside_forward:
    # Inspired by FM2026 "Inside Forward" role (Salah/Robben style)
    # Key FM attributes: Dribbling, Finishing, Off The Ball, Acceleration
    shots_per90: 3.5
    xG_per90: 3.5
    dribbles_success_rate: 3.0
    progressive_carries_per90: 2.5
    carries_into_penalty_area_per90: 2.5
    touches_in_box_per90: 2.5
    xA_per90: 1.5
    key_passes_per90: 1.5

  pressing_winger:
    # Inspired by FM2026 "Winger (Support)" with high pressing duty
    # Key FM attributes: Work Rate, Pace, Dribbling, Pressing
    pressures_per90: 3.5
    pressure_success_rate: 3.0
    dribbles_success_rate: 2.5
    progressive_carries_per90: 2.5
    fouls_won_per90: 2.0
    xA_per90: 1.5
    key_passes_per90: 1.5
    recoveries_per90: 2.0

# ─────────────────────────────────────────────────────────────
# STRIKERS / FORWARDS (ST)
# ─────────────────────────────────────────────────────────────
ST:

  advanced_forward:
    # Inspired by FM2026 "Advanced Forward" role
    # Key FM attributes: Finishing, Off The Ball, Pace, Dribbling
    xG_per90: 4.0
    shots_per90: 3.5
    shots_on_target_per90: 3.0
    xG_per_shot: 2.5
    touches_in_box_per90: 3.0
    dribbles_success_rate: 2.0
    progressive_carries_per90: 1.5
    xA_per90: 1.0

  pressing_forward:
    # Inspired by FM2026 "Pressing Forward" role
    # Key FM attributes: Work Rate, Pressing, Stamina, Aggression
    # Real examples profile: Firmino, Benzema (pressing side)
    pressures_per90: 4.5
    pressure_success_rate: 4.0
    recoveries_per90: 3.0
    tackles_per90: 2.0
    fouls_won_per90: 2.0
    xG_per90: 1.5
    shots_per90: 1.5
    carries_per90: 1.5

  poacher:
    # Inspired by FM2026 "Poacher" role
    # Key FM attributes: Finishing, Off The Ball, Composure, Anticipation
    xG_per_shot: 4.0
    shots_on_target_per90: 3.5
    shots_first_touch_per90: 3.0
    touches_in_box_per90: 3.5
    xG_per90: 3.0
    shots_per90: 2.5
    pressures_per90: 0.5

  deep_lying_forward:
    # Inspired by FM2026 "Deep-Lying Forward" role
    # Key FM attributes: Passing, Vision, First Touch, Work Rate
    key_passes_per90: 3.5
    xA_per90: 3.5
    progressive_passes_per90: 2.5
    carries_per90: 2.5
    progressive_carries_per90: 2.0
    dribbles_success_rate: 2.0
    xG_per90: 1.5
    shots_per90: 1.0
    pressures_per90: 1.5
