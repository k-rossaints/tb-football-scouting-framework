# ============================================================
# TACTICAL ROLE PROFILES
# tb-football-scouting-framework
# ============================================================
# Each role is a weighted combination of player metrics. Weights reflect
# the tactical importance of each metric for that role.
#
# Naming convention: this file uses the ``_per90`` suffix; the parquet
# uses ``_p90``. The matching layer (src/matching.py) translates between
# the two automatically and drops metrics that are not available.
#
# Player examples are deliberately drawn from the empirical 2015/16 top
# of each role in this dataset — they are observations, not assumptions.
# They are not cited as universal archetypes (players evolve over time;
# a 2015/16 striker may not look like his 2020/21 self).
#
# Sources for the role taxonomy:
# - Football Manager role catalogue (Sports Interactive)
# - Academic literature on role-based player profiling
#   (Aalbers & Van Haaren 2019; Wicki 2023)
# - Domain knowledge of modern tactical systems
# ============================================================

# ─────────────────────────────────────────────────────────────
# CENTRE-BACKS (CB)
# ─────────────────────────────────────────────────────────────
CB:

  ball_playing_defender:
    # FM equivalent: Ball-Playing Defender
    # Signature: composed under pressure, distributes through and out of
    # the back line, contributes to build-up rather than just clearing.
    # 2015/16 empirical top: Mascherano, Bartra, Thiago Silva, Kimmich, Piqué
    progressive_passes_per90: 3.0
    pass_completion_rate: 2.5
    pass_completion_under_pressure: 2.5
    progressive_carries_per90: 2.0
    passes_into_final_third_per90: 2.0
    long_pass_completion_rate: 1.5
    switches_per90: 1.5
    xA_per90: 1.0
    tackles_per90: 1.0
    interceptions_per90: 1.0
    aerial_duel_win_rate: 0.5

  no_nonsense_cb:
    # FM equivalent: No-Nonsense Centre-Back
    # Signature: physical duellist who clears danger and wins the air —
    # not asked to play out from the back.
    # REVISED 2026-05: weight the *rates* (discriminative) over volumes
    # (redundant and highly inter-correlated). The colinear
    # ``defensive_actions_per90`` (= tackles + interceptions + clearances)
    # was removed because it was flattening the spread.
    aerial_duel_win_rate: 4.0      # heading signature
    aerial_duels_per90: 3.0        # aerial volume engaged
    ground_duel_win_rate: 3.0      # ground efficiency
    clearances_per90: 3.0
    blocks_per90: 2.5
    interceptions_per90: 2.0
    tackles_per90: 1.5
    recoveries_per90: 1.5
    pass_completion_rate: 0.5      # not asked to be a distributor
    progressive_passes_per90: 0.0  # explicitly neutral

  aerial_dominant_cb:
    # FM-adjacent: a stopper-style CB whose primary value is winning the
    # aerial duel — both volume contested and win rate. Sits between the
    # FM "Stopper" duty (steps out to engage) and a classical target-
    # winning defender.
    aerial_duels_per90: 4.0
    aerial_duel_win_rate: 4.0
    clearances_per90: 3.0
    blocks_per90: 2.0
    tackles_per90: 1.5
    interceptions_per90: 1.5
    ground_duel_win_rate: 1.0

# ─────────────────────────────────────────────────────────────
# FULL-BACKS / WING-BACKS (FB)
# ─────────────────────────────────────────────────────────────
FB:

  complete_wing_back:
    # FM equivalent: Complete Wing-Back
    # Signature: high-volume crosser AND creator from wide. Carries the
    # ball forward and provides genuine assists, not just whipped balls.
    # 2015/16 empirical top: Alex Sandro, Cuadrado, Marcelo, Maicon
    # REVISED 2026-05: weight creation (xA, key_passes) over raw crossing
    # to distinguish actual creators from high-volume but low-impact
    # crossers. Added carries_into_penalty_area for modern attacking-FB
    # signatures.
    xA_per90: 3.5                          # real chance creation
    key_passes_per90: 3.0                  # real chance creation
    crosses_per90: 2.5
    passes_into_penalty_area_per90: 2.5
    progressive_carries_per90: 2.5
    carries_into_penalty_area_per90: 2.0
    carries_into_final_third_per90: 2.0
    dribbles_success_rate: 2.0
    pressures_per90: 1.0
    tackles_per90: 0.5
    interceptions_per90: 0.5

  inverted_wing_back:
    # FM equivalent: Inverted Wing-Back
    # Signature: drifts inside in possession to behave like a deep
    # midfielder — circulates and progresses through the centre.
    progressive_passes_per90: 3.0
    pass_completion_rate: 2.5
    passes_into_final_third_per90: 2.5
    xA_per90: 2.0
    key_passes_per90: 2.0
    carries_per90: 1.5
    touches_per90: 1.5
    tackles_per90: 1.0
    interceptions_per90: 1.0

  defensive_full_back:
    # FM equivalent: Full-Back (Defend)
    # Signature: prioritises positioning, tackling and duel efficiency
    # over forward contribution.
    # 2015/16 empirical top: Filipe Luís, Debuchy, Aurier
    # REVISED 2026-05: removed colinear ``defensive_actions_per90``,
    # added a modest pressing weight (a feature of modern defensive FBs
    # under high-block schemes), and weighted duel *rates* over volumes.
    tackles_per90: 4.0
    interceptions_per90: 3.5
    ground_duel_win_rate: 3.0      # efficiency
    aerial_duel_win_rate: 3.0      # efficiency
    recoveries_per90: 2.5
    pressures_per90: 1.5           # modern FB pressing duty
    clearances_per90: 1.5
    pass_completion_rate: 1.0

# ─────────────────────────────────────────────────────────────
# CENTRAL MIDFIELDERS (MF)
# ─────────────────────────────────────────────────────────────
MF:

  deep_lying_playmaker:
    # FM equivalent: Deep-Lying Playmaker
    # Signature: sets the team's tempo from a deep position, completes
    # passes under pressure, switches play and breaks lines.
    # 2015/16 empirical top: Kroos, Vidal, Thiago Alcântara, Modrić, Xabi Alonso
    progressive_passes_per90: 3.5
    pass_completion_rate: 3.0
    passes_attempted_per90: 2.5
    xA_per90: 2.5
    key_passes_per90: 2.5
    switches_per90: 2.0
    pass_completion_under_pressure: 2.0
    long_pass_completion_rate: 1.5
    pressures_per90: 0.5
    tackles_per90: 0.5

  ball_winning_midfielder:
    # FM equivalent: Ball-Winning Midfielder
    # Signature: high-volume defensive midfielder — tackles, intercepts,
    # presses, recovers, with limited but reliable on-ball output.
    tackles_per90: 4.0
    interceptions_per90: 3.5
    pressures_per90: 3.0
    pressure_success_rate: 2.5
    recoveries_per90: 3.0
    defensive_actions_per90: 2.5
    ground_duel_win_rate: 2.0
    pass_completion_rate: 1.0
    progressive_passes_per90: 0.5

  box_to_box_midfielder:
    # FM equivalent: Box-to-Box Midfielder
    # Signature: covers ground vertically — carries the ball forward,
    # arrives in the box to shoot, while still contributing defensively.
    # REVISED 2026-05: previous version had uniform ~2.0 weights and
    # rewarded "average everywhere" profiles (top1 ~77, spread ~4). New
    # weighting emphasises carries + finishing (the transition signature
    # that distinguishes B2B from BWM), with defending demoted to a
    # baseline rather than a primary requirement.
    progressive_carries_per90: 3.5
    carries_into_final_third_per90: 3.0
    shots_per90: 3.0
    xG_per90: 2.5
    pressures_per90: 2.5
    key_passes_per90: 2.0
    tackles_per90: 2.0
    progressive_passes_per90: 1.5
    interceptions_per90: 1.5
    xA_per90: 1.0

  mezzala:
    # FM equivalent: Mezzala
    # Signature: half-space operator who carries into the final third,
    # combines creation with arriving runs and shooting threat.
    # 2015/16 empirical top: Cazorla, Thiago Alcântara, Hamšík
    progressive_carries_per90: 3.0
    carries_into_final_third_per90: 3.0
    dribbles_success_rate: 2.5
    key_passes_per90: 2.5
    xA_per90: 2.5
    shots_per90: 2.0
    xG_per90: 1.5
    progressive_passes_per90: 2.0
    pass_completion_rate: 1.5

# ─────────────────────────────────────────────────────────────
# ATTACKING MIDFIELDERS / WINGERS (AM)
# ─────────────────────────────────────────────────────────────
AM:

  advanced_playmaker:
    # FM equivalent: Advanced Playmaker
    # Signature: primary creator in the final third — vision, key passes,
    # final-third entries, high touch volume in dangerous zones.
    # 2015/16 empirical top: Messi, Valbuena, Özil, Di María, David Silva
    key_passes_per90: 4.0
    xA_per90: 4.0
    progressive_passes_per90: 3.0
    passes_into_penalty_area_per90: 2.5
    pass_completion_rate: 2.0
    touches_per90: 2.0
    dribbles_success_rate: 1.5
    shots_per90: 1.0

  inside_forward:
    # FM equivalent: Inside Forward
    # Signature: wide forward who cuts inside to shoot, carries into the
    # box, finishes — but also contributes some creation.
    # 2015/16 empirical top: Messi, Neymar, Alexis Sánchez
    shots_per90: 3.5
    xG_per90: 3.5
    dribbles_success_rate: 3.0
    progressive_carries_per90: 2.5
    carries_into_penalty_area_per90: 2.5
    touches_in_box_per90: 2.5
    xA_per90: 1.5
    key_passes_per90: 1.5

  pressing_winger:
    # FM-adjacent: Winger with a high pressing duty.
    # Signature: wide attacker whose first job out of possession is to
    # press and win the ball back high up the pitch.
    pressures_per90: 3.5
    pressure_success_rate: 3.0
    dribbles_success_rate: 2.5
    progressive_carries_per90: 2.5
    fouls_won_per90: 2.0
    xA_per90: 1.5
    key_passes_per90: 1.5
    recoveries_per90: 2.0

# ─────────────────────────────────────────────────────────────
# STRIKERS / FORWARDS (ST)
# ─────────────────────────────────────────────────────────────
ST:

  advanced_forward:
    # FM equivalent: Advanced Forward
    # Signature: complete attacking forward — high shot volume and xG,
    # works in the box, runs in behind, contributes some carries.
    # 2015/16 empirical top: Aubameyang, Ibrahimović, Benzema, Agüero, Lewandowski
    xG_per90: 4.0
    shots_per90: 3.5
    shots_on_target_per90: 3.0
    xG_per_shot: 2.5
    touches_in_box_per90: 3.0
    dribbles_success_rate: 2.0
    progressive_carries_per90: 1.5
    xA_per90: 1.0

  pressing_forward:
    # FM equivalent: Pressing Forward
    # Signature: defends from the front — leads the press, recovers
    # balls high, draws fouls; finishing is secondary to the defensive
    # workload.
    # 2015/16 empirical top: Ángel Correa, Ulloa
    pressures_per90: 4.5
    pressure_success_rate: 4.0
    recoveries_per90: 3.0
    tackles_per90: 2.0
    fouls_won_per90: 2.0
    xG_per90: 1.5
    shots_per90: 1.5
    carries_per90: 1.5

  poacher:
    # FM equivalent: Poacher
    # Signature: pure box-occupant — high xG per shot, lots of touches
    # in the box, finishes first-time chances. Minimal defensive duty.
    # 2015/16 empirical top: Aubameyang, Suárez, Lewandowski, Benzema, Gameiro
    xG_per_shot: 4.0
    shots_on_target_per90: 3.5
    shots_first_touch_per90: 3.0
    touches_in_box_per90: 3.5
    xG_per90: 3.0
    shots_per90: 2.5
    pressures_per90: 0.5

  deep_lying_forward:
    # FM equivalent: Deep-Lying Forward
    # Signature: drops into midfield to link play — creates more than he
    # finishes, carries the ball, combines with onrushing midfielders.
    # 2015/16 empirical top: Dybala, Iheanacho
    key_passes_per90: 3.5
    xA_per90: 3.5
    progressive_passes_per90: 2.5
    carries_per90: 2.5
    progressive_carries_per90: 2.0
    dribbles_success_rate: 2.0
    xG_per90: 1.5
    shots_per90: 1.0
    pressures_per90: 1.5
